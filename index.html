<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InventryPro | Home</title> 
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        /* Base Transitions */
        body { transition: background-color 0.3s, color 0.3s; background-color: #fff1f2; color: #831843; }
        nav, footer { background-color: #be185d; transition: all 0.3s; }
        
        /* Dark Mode Override */
        .dark body { background-color: #111827; color: #f3f4f6; }
        .dark nav, .dark footer { background-color: #1f2937; }
        .dark .bg-white { background-color: #1f2937 !important; color: white; }
        .dark input, .dark select { background-color: #374151 !important; color: white; border-color: #4b5563 !important; }

        .hidden-view { display: none !important; }
        
        /* Toggle Switch Styling */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ec4899; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body class="font-sans flex flex-col min-h-screen">

    <nav class="p-4 text-white flex justify-between items-center shadow-2xl sticky top-0 z-50">
        <div class="flex flex-col">
            <div class="font-bold text-2xl flex items-center gap-2">
                <span>📦</span> InventryPro
            </div>
            <span class="text-[10px] opacity-80 font-medium tracking-[0.2em] uppercase ml-8">Developed by Fizza Azeem</span>
        </div>
        <ul class="hidden md:flex gap-8 font-bold text-sm uppercase tracking-widest">
            <li><a href="index.html" class="hover:text-pink-200 border-b-2 border-white">Home</a></li>
            <li><a href="pages/about.html" class="hover:text-pink-200">About</a></li>
            <li><a href="pages/contact.html" class="hover:text-pink-200">Contact</a></li>
            <li><a href="pages/signin.html" class="hover:text-pink-200">Sign In</a></li>
        </ul>
        <div class="flex items-center gap-3">
            <span class="text-[10px] font-black uppercase">Dark Mode</span>
            <label class="switch">
                <input type="checkbox" id="themeToggle">
                <span class="slider"></span>
            </label>
        </div>
    </nav>

    <main class="flex-grow container mx-auto p-6 lg:p-12">
        <div id="dashboardView">
            <div class="flex flex-col md:flex-row gap-4 mb-12">
                <input type="text" id="searchInput" placeholder="Search items..." class="p-5 border-2 border-pink-200 rounded-2xl w-full md:w-3/4 outline-none shadow-xl transition-all">
                <button id="showFormBtn" class="bg-pink-600 text-white px-10 py-5 rounded-2xl font-black shadow-2xl flex-1 hover:bg-pink-700 transform hover:scale-105 transition-all">+ ADD NEW ITEM</button>
            </div>
            <div id="itemGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </div>

        <div id="formView" class="hidden-view">
            <div class="max-w-2xl mx-auto bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-pink-500">
                <button id="backBtn" class="mb-8 text-pink-600 font-black uppercase text-sm">← Back</button>
                <form id="inventoryForm" class="space-y-6">
                    <input type="hidden" id="editId">
                    <input type="text" id="itemName" placeholder="Product Name" required class="w-full p-4 border-2 rounded-xl">
                    <select id="itemCategory" class="w-full p-4 border-2 rounded-xl">
                        <option value="Electronics">Electronics</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Accessories">Accessories</option>
                    </select>
                    <input type="number" id="itemPrice" placeholder="Price" required class="w-full p-4 border-2 rounded-xl">
                    <button type="submit" class="w-full bg-pink-600 text-white py-4 rounded-xl font-bold">SAVE PRODUCT</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="p-8 text-white text-center">
        <p class="font-black uppercase text-sm">© 2026 InventryPro - Developed by Fizza Azeem</p>
    </footer>

    <script>
        // --- Shared Dark Mode Logic ---
        const themeToggle = document.getElementById('themeToggle');
        
        // Check local storage on load
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            themeToggle.checked = true;
        }

        themeToggle.onchange = () => {
            if (themeToggle.checked) {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            }
        };

        // --- Inventory Data (12 Items) ---
        let inventory = [
            { id: "101", name: "Gaming Laptop", price: 1200, category: "Electronics" },
            { id: "102", name: "Ergonomic Chair", price: 250, category: "Furniture" },
            { id: "103", name: "Mechanical Keyboard", price: 85, category: "Accessories" },
            { id: "104", name: "Wireless Mouse", price: 45, category: "Accessories" },
            { id: "105", name: "UltraWide Monitor", price: 550, category: "Electronics" },
            { id: "106", name: "Executive Desk", price: 400, category: "Furniture" },
            { id: "107", name: "Smart Watch", price: 199, category: "Electronics" },
            { id: "108", name: "Bluetooth Speaker", price: 120, category: "Electronics" },
            { id: "109", name: "Leather Sofa", price: 899, category: "Furniture" },
            { id: "110", name: "USB-C Hub", price: 35, category: "Accessories" },
            { id: "111", name: "Winter Jacket", price: 150, category: "Apparel" },
            { id: "112", name: "Desk Lamp", price: 25, category: "Furniture" }
        ];

        function renderUI(data) {
            const grid = document.getElementById('itemGrid');
            grid.innerHTML = data.map(item => `
                <div class="bg-white p-8 rounded-[2rem] shadow-xl border-b-8 border-pink-500">
                    <h3 class="text-2xl font-black mt-2">${item.name}</h3>
                    <p class="text-sm font-bold text-gray-400 italic">${item.category}</p>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-3xl font-black text-pink-600">$${item.price}</span>
                        <div class="flex gap-2">
                            <button onclick="handleEdit('${item.id}')">✏️</button>
                            <button onclick="handleDelete('${item.id}')">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Search, Edit, Delete (Common Logic)
        document.getElementById('searchInput').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            renderUI(inventory.filter(i => i.name.toLowerCase().includes(term)));
        };

        const toggleView = (showDash) => {
            document.getElementById('dashboardView').classList.toggle('hidden-view', !showDash);
            document.getElementById('formView').classList.toggle('hidden-view', showDash);
        };

        document.getElementById('showFormBtn').onclick = () => toggleView(false);
        document.getElementById('backBtn').onclick = () => toggleView(true);

        renderUI(inventory);
    </script>
</body>
</html>
