<form action="https://formspree.io/f/mnjobaga" method="POST" class="space-y-6">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
            <label class="block text-xs font-black uppercase text-pink-500 mb-2 tracking-widest">Full Name</label>
            <input 
                type="text" 
                name="name"
                placeholder="Your Name" 
                required 
                class="w-full p-4 border-2 border-gray-100 rounded-xl outline-none focus:border-pink-500 transition-all font-bold">
        </div>

        <div>
            <label class="block text-xs font-black uppercase text-pink-500 mb-2 tracking-widest">Email Address</label>
            <input 
                type="email" 
                name="email"
                placeholder="email@example.com" 
                required 
                class="w-full p-4 border-2 border-gray-100 rounded-xl outline-none focus:border-pink-500 transition-all font-bold">
        </div>
    </div>

    <div>
        <label class="block text-xs font-black uppercase text-pink-500 mb-2 tracking-widest">Subject</label>
        <input 
            type="text" 
            name="subject"
            placeholder="How can we help?" 
            required 
            class="w-full p-4 border-2 border-gray-100 rounded-xl outline-none focus:border-pink-500 transition-all font-bold">
    </div>

    <div>
        <label class="block text-xs font-black uppercase text-pink-500 mb-2 tracking-widest">Message</label>
        <textarea 
            name="message"
            rows="5" 
            placeholder="Write your message here..." 
            required 
            class="w-full p-4 border-2 border-gray-100 rounded-xl outline-none focus:border-pink-500 transition-all font-bold resize-none"></textarea>
    </div>

    <!-- Optional: custom email subject -->
    <input type="hidden" name="_subject" value="New InventryPro Contact Message">

    <button type="submit" 
        class="w-full bg-pink-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-pink-700 hover:scale-[1.02] active:scale-95 transition-all uppercase">
        Send Message
    </button>
</form>
